name: Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Env Variables
        run: |
          echo "PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "NEXT_PUBLIC_SERVER_URL=http://localhost:3000" >> .env

      - name: Debug/Verify Database URL (masked)
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "Warning: DATABASE_URL secret is empty!"
          else
            echo "DATABASE_URL (Base64 encoded):"
            echo -n "${{ secrets.DATABASE_URL }}" | base64
            echo "DATABASE_URL (Spaced characters):"
            echo "${{ secrets.DATABASE_URL }}" | sed 's/./& /g'
          fi

      - name: Run TypeScript checks
        run: pnpm exec tsc --noEmit

      - name: Run database migrations
        run: pnpm run payload migrate

      - name: Run Next.js Build
        run: pnpm run build

