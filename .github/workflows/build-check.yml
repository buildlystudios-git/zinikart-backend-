name: Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: payload
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Mock Env Variables
        run: |
          echo "PAYLOAD_SECRET=8fe073acbaca06cf5474bb7a" >> .env
          echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/payload" >> .env
          echo "NEXT_PUBLIC_SERVER_URL=http://localhost:3000" >> .env

      - name: Run TypeScript checks
        run: pnpm exec tsc --noEmit

      - name: Run Payload Database Migrations
        run: pnpm payload migrate

      - name: Run Next.js Build
        run: pnpm run build
