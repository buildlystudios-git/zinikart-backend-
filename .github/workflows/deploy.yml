name: Deploy to Amazon ECS Express Mode

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1 # Replace with your region
  ECR_REPOSITORY: zinikart-backend # Replace with your ECR repo name
  ECS_CLUSTER: zinikart-cluster # Replace with your ECS cluster name
  ECS_SERVICE: zinikart-api-service # Replace with your ECS service name

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # IMPORTANT: Replace this ARN with the actual IAM Role ARN you create for GitHub OIDC
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsECSRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to Amazon ECS Express Mode
        run: |
          # ECS Express Mode handles deployments directly by forcing a new deployment.
          # Since it pulls 'latest' (or a specific tag), updating the service will pull the new image.
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment
